# render.yaml — Render.com ga deploy qilish uchun
# Render.com da "Blueprint" sifatida ishlatiladi

services:
  # === TELEGRAM BOT ===
  - type: worker
    name: uzbekistan-bot
    runtime: python
    buildCommand: pip install -r bot/requirements.txt
    startCommand: python bot/bot.py
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"

  # === WEB SAYT ===
  - type: web
    name: uzbekistan-web
    runtime: python
    buildCommand: pip install -r web/requirements.txt
    startCommand: cd web && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"

# Render.com da ikki xizmat bir xil DB faylini ko'rishi uchun
# Persistent Disk ishlatiladi yoki PostgreSQL tavsiya etiladi.
# Hozircha SQLite — bir servisda ishlating (web + bot bitta service).
