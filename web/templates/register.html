<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ro'yxatdan o'tish</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header class="header">
  <div class="container hflex">
    <a href="/" class="logo">🇺🇿 Vatanimni Bilaman</a>
  </div>
</header>
<main>
  <div class="container">
    <div class="centered-card">
      <div style="font-size:52px;margin-bottom:16px">🤖</div>
      <h2>Ro'yxatdan o'tish botda!</h2>
      <p>
        Saytga kirish uchun avval Telegram botimizda
        <b>/start</b> yuborib ro'yxatdan o'ting.<br><br>
        Bot sizdan <b>username</b> va <b>parol</b> o'ylab topishni so'raydi.
        Shundan keyin shu saytga qaytib kiring.
      </p>
      <a href="https://t.me/{{ bot_username }}" class="btn btn-primary" target="_blank">
        🤖 Botga o'tish → /start
      </a>
      <br><br>
      <a href="/" style="color:#999;font-size:14px">← Orqaga</a>
    </div>
  </div>
</main>
</body>
</html>
